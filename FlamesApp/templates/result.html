<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FLAMES Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="container">
      <section class="result">
        <h2>Result Animation</h2>
        <div class="cut-animation" id="cut-animation" data-name-one="{{ first_name }}" data-name-two="{{ second_name }}">
          <p class="animation-title">Cutting common letters...</p>
          <div class="name-row">
            <span class="name-label">Name 1</span>
            <div class="letters" id="letters-one"></div>
          </div>
          <div class="name-row">
            <span class="name-label">Name 2</span>
            <div class="letters" id="letters-two"></div>
          </div>
        </div>

        <div class="flames-animation" id="flames-animation">
          <p class="flames-title">Eliminating FLAMES letters...</p>
          <div class="flames-letters" id="flames-letters"></div>
        </div>

        <a class="back-link" href="{{ url_for('index') }}">BACK</a>
      </section>
    </main>

    <div class="overlay hidden-result" id="result-overlay" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
      <div class="overlay-card">
        <button type="button" class="overlay-cross" id="overlay-cross" aria-label="Close overlay">&times;</button>
        <div class="overlay-emoji">{{ emoji }}</div>
        <h3 id="overlay-title">FLAMES Result</h3>
        <p>{{ first_name }} + {{ second_name }}</p>
        <p class="overlay-result">{{ result }}</p>
      </div>
    </div>

    <script>
      const animationRoot = document.getElementById("cut-animation");

      function normalizeName(value) {
        return (value || "").toLowerCase().replace(/[^a-z]/g, "");
      }

      function renderLetters(container, value) {
        const chars = value.split("");
        container.innerHTML = "";
        chars.forEach((char, index) => {
          const span = document.createElement("span");
          span.className = "letter";
          span.dataset.index = String(index);
          span.textContent = char;
          container.appendChild(span);
        });
      }

      function getCutPairs(nameOne, nameTwo) {
        const positionsByChar = new Map();
        [...nameTwo].forEach((char, index) => {
          if (!positionsByChar.has(char)) {
            positionsByChar.set(char, []);
          }
          positionsByChar.get(char).push(index);
        });

        const pairs = [];
        [...nameOne].forEach((char, indexOne) => {
          const pool = positionsByChar.get(char);
          if (pool && pool.length > 0) {
            const indexTwo = pool.shift();
            pairs.push([indexOne, indexTwo]);
          }
        });

        return pairs;
      }

      function unmatchedCount(nameOne, nameTwo, pairs) {
        return nameOne.length + nameTwo.length - 2 * pairs.length;
      }

      function renderFlames(container) {
        const sequence = ["F", "L", "A", "M", "E", "S"];
        container.innerHTML = "";
        sequence.forEach((char, index) => {
          const span = document.createElement("span");
          span.className = "flames-letter";
          span.dataset.flameId = String(index);
          span.textContent = char;
          container.appendChild(span);
        });
      }

      function runFlamesElimination(count, startDelay, onComplete) {
        const flamesRoot = document.getElementById("flames-animation");
        const flamesTitle = flamesRoot ? flamesRoot.querySelector(".flames-title") : null;
        const flamesLetters = document.getElementById("flames-letters");

        if (!flamesRoot || !flamesLetters || !flamesTitle) {
          return;
        }

        renderFlames(flamesLetters);

        const baseSequence = ["F", "L", "A", "M", "E", "S"].map((char, index) => ({
          char,
          id: index,
        }));

        const eliminated = [];
        let active = [...baseSequence];
        let index = 0;

        if (count === 0) {
          active.forEach((item) => {
            if (item.char !== "S") {
              eliminated.push(item);
            }
          });
          active = active.filter((item) => item.char === "S");
        } else {
          while (active.length > 1) {
            index = (index + count - 1) % active.length;
            eliminated.push(active[index]);
            active.splice(index, 1);
          }
        }

        const stepDelay = 500;
        eliminated.forEach((item, step) => {
          setTimeout(() => {
            const target = flamesLetters.querySelector(`[data-flame-id="${item.id}"]`);
            if (target) {
              target.classList.add("eliminated");
            }
          }, startDelay + step * stepDelay);
        });

        const winner = active[0];
        const winnerDelay = startDelay + Math.max(eliminated.length, 1) * stepDelay;
        setTimeout(() => {
          const winnerElement = flamesLetters.querySelector(`[data-flame-id="${winner.id}"]`);
          if (winnerElement) {
            winnerElement.classList.add("winner");
          }
          flamesTitle.textContent = `FLAMES final letter: ${winner.char}`;
          if (typeof onComplete === "function") {
            onComplete();
          }
        }, winnerDelay);
      }

      if (animationRoot) {
        const nameOne = normalizeName(animationRoot.dataset.nameOne);
        const nameTwo = normalizeName(animationRoot.dataset.nameTwo);

        const lettersOne = document.getElementById("letters-one");
        const lettersTwo = document.getElementById("letters-two");
        const resultOverlay = document.getElementById("result-overlay");
        const closeButton = document.getElementById("overlay-cross");

        renderLetters(lettersOne, nameOne);
        renderLetters(lettersTwo, nameTwo);

        if (closeButton) {
          closeButton.addEventListener("click", () => {
            if (resultOverlay) {
              resultOverlay.classList.add("hidden-result");
            }
          });
        }

        const pairs = getCutPairs(nameOne, nameTwo);
        const count = unmatchedCount(nameOne, nameTwo, pairs);

        pairs.forEach(([i, j], step) => {
          const delay = 450 * (step + 1);
          setTimeout(() => {
            const first = lettersOne.querySelector(`[data-index="${i}"]`);
            const second = lettersTwo.querySelector(`[data-index="${j}"]`);
            if (first) {
              first.classList.add("cut");
            }
            if (second) {
              second.classList.add("cut");
            }
          }, delay);
        });

        const cuttingDuration = pairs.length > 0 ? 450 * pairs.length + 350 : 200;
        runFlamesElimination(count, cuttingDuration, () => {
          if (resultOverlay) {
            resultOverlay.classList.remove("hidden-result");
          }
        });
      }
    </script>
  </body>
</html>
